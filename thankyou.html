        color: #938357;
        margin-bottom: 12px;
        font-family: "Playfair Display", serif;
    }

    .success-text {
      font-size: 18px;
      color: #938357;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .btn-back {
      background: var(--gold-dark);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: .7rem 1.5rem;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
